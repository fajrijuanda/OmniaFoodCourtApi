name: Deploy Prisma to Supabase

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: supabase-prisma-${{ github.ref }}
  cancel-in-progress: false

jobs:
  migrate-and-seed:
    name: Migrate and seed Supabase
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Deploy migrations
        run: npm run prisma:deploy

      - name: Seed catalog and internal accounts
        run: npm run seed
